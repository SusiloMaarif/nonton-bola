<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonton — Streaming Bola</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .top-bar { background: #0a0a0f; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1a1a2e; position: sticky; top: 0; z-index: 100; }
        .top-bar a { color: #e94560; text-decoration: none; font-weight: 700; font-size: 14px; }
        .top-bar a:hover { text-decoration: underline; }
        .top-bar .title { font-size: 14px; color: #888; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .player-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; min-height: 60vh; }
        .player-container iframe { width: 100%; height: 100vh; border: none; position: absolute; top: 0; left: 0; }
        .player-container video { width: 100%; max-height: 85vh; background: #000; outline: none; }
        .player-fallback { text-align: center; padding: 40px 20px; color: #888; }
        .player-fallback .big-icon { font-size: 64px; margin-bottom: 20px; }
        .player-fallback h3 { color: #fff; margin-bottom: 10px; }
        .player-fallback .stream-url { background: #1a1a2e; padding: 12px 20px; border-radius: 8px; word-break: break-all; font-size: 13px; margin: 16px auto; max-width: 600px; border: 1px solid #333; }
        .player-fallback .stream-url a { color: #e94560; }
        .player-fallback .btn { display: inline-block; padding: 12px 28px; background: #e94560; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 700; margin: 4px; }
        .player-fallback .btn-outline { display: inline-block; padding: 12px 28px; background: transparent; border: 2px solid #e94560; color: #e94560; text-decoration: none; border-radius: 8px; font-weight: 700; margin: 4px; }
        .info-bar { background: #0a0a0f; padding: 16px 20px; border-top: 1px solid #1a1a2e; font-size: 13px; color: #666; text-align: center; }
        @media (max-width: 600px) { .player-container iframe { height: 50vh; position: relative; } .top-bar .title { max-width: 50%; } }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="javascript:history.back()">← Kembali</a>
        <div class="title" id="streamTitle">Loading...</div>
        <a href="/">🏠</a>
    </div>
    <div class="player-container" id="playerContainer">
        <div class="player-fallback" id="fallback">
            <div class="big-icon">⚽</div>
            <h3>Memuat player...</h3>
            <p>Silakan tunggu sebentar</p>
        </div>
    </div>
    <div class="info-bar">⚡ Kalo stream mati, <a href="javascript:location.reload()" style="color:#e94560">refresh</a> atau cari link lain. <a href="/" style="color:#e94560">Cari stream lain →</a></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const streamUrl = params.get('url') || '';
        const streamName = params.get('name') || 'Stream';
        let streamType = params.get('type') || 'web';
        
        document.title = streamName + ' — Nonton Bola';
        document.getElementById('streamTitle').textContent = streamName;
        
        const container = document.getElementById('playerContainer');
        const fallback = document.getElementById('fallback');
        const decodedUrl = decodeURIComponent(streamUrl);
        
        function showFallback(msg) {
            fallback.style.display = 'block';
            fallback.innerHTML = msg;
        }

        if (!decodedUrl) {
            showFallback(`<div class="big-icon">😵</div><h3>URL stream kosong</h3><p>Gak ada link stream.</p><a href="/" class="btn">Cari Stream</a>`);
        } else if (streamType === 'direct' || streamType === 'youtube' || streamType === 'iframe') {
            fallback.style.display = 'none';
            const iframe = document.createElement('iframe');
            iframe.src = decodedUrl;
            iframe.allow = 'autoplay; encrypted-media; fullscreen';
            iframe.allowFullscreen = true;
            iframe.style.width = '100%';
            iframe.style.height = '100vh';
            container.appendChild(iframe);
        } else if (streamType === 'm3u8') {
            fallback.style.display = 'none';
            const video = document.createElement('video'); video.controls = true; video.autoplay = true; video.playsInline = true; video.style.width = '100%'; video.style.maxHeight = '85vh';
            container.appendChild(video);
            
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest';
            script.onload = () => {
                if (Hls.isSupported()) { const hls = new Hls(); hls.loadSource(decodedUrl); hls.attachMedia(video); hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{})); }
                else if (video.canPlayType('application/vnd.apple.mpegurl')) { video.src = decodedUrl; }
                else { showFallback(`<div class="big-icon">⚠️</div><h3>Browser tidak support HLS</h3><p>Buka pake VLC:</p><div class="stream-url"><a href="${decodedUrl}" target="_blank">${decodedUrl}</a></div><a href="${decodedUrl}" target="_blank" class="btn">Buka Stream</a>`); }
            };
            script.onerror = () => { video.src = decodedUrl; };
            document.head.appendChild(script);
        } else {
            fallback.style.display = 'none';
            if (decodedUrl.match(/\.(mp4|webm|ogg)(\?|$)/i)) {
                const video = document.createElement('video'); video.controls = true; video.autoplay = true; video.playsInline = true; video.style.width = '100%'; video.style.maxHeight = '85vh'; video.src = decodedUrl;
                container.appendChild(video);
            } else if (decodedUrl.toLowerCase().includes('youtube.com') || decodedUrl.toLowerCase().includes('youtu.be')) {
                const iframe = document.createElement('iframe'); iframe.src = decodedUrl; iframe.allow = 'autoplay; encrypted-media; fullscreen'; iframe.allowFullscreen = true; iframe.style.width = '100%'; iframe.style.height = '100vh';
                container.appendChild(iframe);
            } else {
                const iframe = document.createElement('iframe'); iframe.src = decodedUrl; iframe.allow = 'autoplay; encrypted-media; fullscreen'; iframe.allowFullscreen = true; iframe.style.width = '100%'; iframe.style.height = '100vh';
                container.appendChild(iframe);
                setTimeout(() => {
                    try { if (iframe.contentDocument) {} } catch(e) {
                        iframe.style.display = 'none';
                        showFallback(`<div class="big-icon">🔗</div><h3>Stream tidak bisa di-embed</h3><p>Buka langsung di tab baru:</p><div class="stream-url"><a href="${decodedUrl}" target="_blank">${decodedUrl}</a></div><a href="${decodedUrl}" target="_blank" class="btn">Buka Stream</a> <a href="/" class="btn-outline">Cari Lain</a>`);
                    }
                }, 2000);
            }
        }
    </script>
</body>
</html>
